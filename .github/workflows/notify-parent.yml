name: Notify Parent Repository

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

      - name: Commit build results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update build files

          🤖 Generated with GitHub Actions"

      - name: Push changes
        run: git push

  notify:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Trigger parent repository update
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.PARENT_REPO_TOKEN }}
          repository: k-nunome/ds_replace
          event-type: submodule-update
          client-payload: '{"ref": "${{ github.sha }}"}'