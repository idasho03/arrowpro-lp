# Docker Compose configuration for arrowpro-sub-contents
# Usage:
#   docker compose up dev              # Start lp-client dev server (port 1234)
#   docker compose up dev-professional # Start lp-professional dev server (port 1235)
#   docker compose up dev-request      # Start request dev server (port 1236)
#   docker compose run --rm build      # Build all targets

services:
  # --------------------------------------------------------------------------
  # Development server for lp-client (port 1234)
  # --------------------------------------------------------------------------
  dev:
    image: node:22-alpine
    ports:
      - "1234:1234"
    volumes:
      - ./lp-client:/app/lp-client
    working_dir: /app
    command: sh -c "echo '{}' > package.json && npm install parcel && npx parcel serve lp-client/index.html --port 1234 --host 0.0.0.0 --no-hmr"

  # --------------------------------------------------------------------------
  # Development server for lp-professional (port 1235)
  # --------------------------------------------------------------------------
  dev-professional:
    image: node:22-alpine
    ports:
      - "1235:1235"
    volumes:
      - ./lp-professional:/app/lp-professional
    working_dir: /app
    command: sh -c "echo '{}' > package.json && npm install parcel && npx parcel serve lp-professional/index.html --port 1235 --host 0.0.0.0 --no-hmr"

  # --------------------------------------------------------------------------
  # Development server for request (port 1236)
  # --------------------------------------------------------------------------
  dev-request:
    image: node:22-alpine
    ports:
      - "1236:1236"
    volumes:
      - ./request:/app/request
    working_dir: /app
    command: sh -c "echo '{}' > package.json && npm install parcel && npx parcel serve request/index.html --port 1236 --host 0.0.0.0 --no-hmr"

  # --------------------------------------------------------------------------
  # Build all targets and output to static-output/
  # --------------------------------------------------------------------------
  build:
    image: node:22-alpine
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "npm install && npm run build"
