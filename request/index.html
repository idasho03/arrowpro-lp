<!DOCTYPE html>
<html lang="ja">
<head>

    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
            new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-WKN2CPSR');</script>
    <!-- End Google Tag Manager -->

    <meta charset="utf-8" />
    <title>資料をダウンロード | ARROW pro</title>
    <meta name="description" content="ARROW proの資料ダウンロードページです。サービス資料をダウンロードいただけます。" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../lp-client/img/09-common/favicon.png" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WKN2CPSR"
                      height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <main class="container">
        <div class="form-card">
            <div class="logo-container">
                <span class="logo-text">ARROW pro</span>
            </div>

            <h1 class="form-title">資料をダウンロード</h1>
            
            <div class="document-image-container">
                <img src="img/ARROW proご紹介資料_v1.0.pdf.webp" alt="資料プレビュー" class="document-image" />
            </div>
            
            <p class="form-description">以下のフォームに必要事項をご入力ください。ご入力いただいたメールアドレス宛に、自動で資料URLをお送りします。</p>

            <form id="documentRequestForm" class="form-content">
                <div class="form-group">
                    <label class="form-label">
                        会社名<span class="required">*</span>
                    </label>
                    <input type="text" id="companyName" class="form-input" placeholder="例: 株式会社○○" />
                    <p class="error-message" id="companyNameError"></p>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        担当者名<span class="required">*</span>
                    </label>
                    <input type="text" id="representativeName" class="form-input" placeholder="例: 山田 太郎" />
                    <p class="error-message" id="representativeNameError"></p>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">
                            メールアドレス<span class="required">*</span>
                        </label>
                        <input type="text" id="email" class="form-input" placeholder="例: client@example.com" />
                        <p class="error-message" id="emailError"></p>
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            電話番号<span class="required">*</span>
                        </label>
                        <input type="tel" id="phone" class="form-input" placeholder="例: 0312345678（ハイフン無し）" />
                        <p class="error-message" id="phoneError"></p>
                    </div>
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="agreeTerms" class="checkbox-input" />
                        <label for="agreeTerms" class="checkbox-label">
                            <a href="/privacy" target="_blank" class="link-text">プライバシーポリシー</a>に同意する<span class="required">*</span>
                        </label>
                    </div>
                    <p class="error-message" id="agreeTermsError"></p>
                </div>

                <button type="submit" class="submit-button" id="submitButton">
                    資料をメールで受け取る
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-left: 8px;">
                        <path d="M6 12L10 8L6 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
